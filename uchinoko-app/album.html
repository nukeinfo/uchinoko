        body { background-color: #f5f5dc; font-family: sans-serif; padding: 20px; color: #000; text-align: center; }
        h1 { font-size: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; text-align: left; }
        .back-btn { display: block; text-align: left; margin-bottom: 15px; text-decoration: none; color: #000; font-weight: bold; }

        /* アップロードエリア */
        .upload-section { background: #fff; border: 2px solid #000; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input[type="file"] { margin-top: 10px; font-size: 16px; }
        .save-btn { background-color: #adff2f; border: 2px solid #000; border-radius: 10px; font-weight: bold; width: 100%; padding: 15px; margin-top: 15px; font-size: 18px; cursor: pointer; }

        /* アルバム表示（グリッド） */
        .album-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .album-item { background: #fff; border: 1px solid #000; padding: 5px; border-radius: 5px; position: relative; }
        .album-item img, .album-item video { width: 100%; border-radius: 3px; display: block; height: auto; aspect-ratio: 1/1; object-fit: cover; }
        
        /* 削除ボタン */
        .del-badge { 
            position: absolute; top: 5px; right: 5px; 
            background: rgba(255, 77, 77, 0.9); color: white; 
            border: none; border-radius: 50%; width: 25px; height: 25px; 
            cursor: pointer; font-weight: bold; font-size: 14px; z-index: 10;
        }
    </style>
