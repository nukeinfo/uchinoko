<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画・写真 - うちの子記録</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        body { background-color: #f5f5dc; font-family: sans-serif; padding: 20px; color: #000; padding-bottom: 40px; }
        h1 { font-size: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .back-btn { display: block; margin-bottom: 15px; text-decoration: none; color: #000; font-weight: bold; }
        .section { background: #fff; border: 2px solid #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .section-title { font-weight: bold; font-size: 16px; margin-bottom: 12px; border-left: 5px solid #adff2f; padding-left: 8px; }
        .green-btn { background-color: #adff2f; border: 2px solid #000; border-radius: 10px; font-weight: bold; width: 100%; padding: 15px; font-size: 17px; cursor: pointer; box-shadow: 2px 2px 0px #000; -webkit-appearance: none; margin-top: 10px; }
        .sub-btn { background: #fff; border: 2px solid #000; border-radius: 8px; font-weight: bold; padding: 10px; font-size: 14px; cursor: pointer; flex: 1; }
        #previewVideo { width: 100%; border-radius: 8px; background: #000; display: block; margin-bottom: 10px; }
        .slider-label { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        input[type="range"] { width: 100%; }
        .time-display { font-size: 13px; color: #555; margin: 4px 0 10px; }
        .trim-btns { display: flex; gap: 8px; margin-top: 8px; }
        .name-input { width: 100%; padding: 10px; font-size: 16px; border: 2px solid #000; border-radius: 8px; margin: 8px 0; -webkit-appearance: none; }
        .clip-item { background: #fff; border: 2px solid #000; border-left: 6px solid #adff2f; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .clip-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .clip-info { font-size: 13px; color: #555; margin-bottom: 8px; }
        .clip-btns { display: flex; gap: 8px; }
        .play-btn { background: #adff2f; border: 2px solid #000; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 14px; cursor: pointer; flex: 1; }
        .del-btn { background: #fff; border: 2px solid #000; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 14px; cursor: pointer; color: #c00; }
        .empty-msg { color: #888; font-style: italic; text-align: center; padding: 10px 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        #modalVideo { width: 100%; max-height: 75vh; }
        #modalImage { display: none; width: 100%; max-height: 75vh; object-fit: contain; }
        .modal-close { position: absolute; top: 15px; right: 15px; color: #fff; font-size: 40px; cursor: pointer; font-weight: bold; background: none; border: none; line-height: 1; }
        .modal-label { color: #fff; font-size: 15px; margin-top: 12px; text-align: center; padding: 0 20px; }
        .notice { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.5; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 戻る</a>
    <h1>📹 病院用 動画・写真</h1>

    <div class="section">
        <div class="section-title">① 動画または写真を選ぶ</div>
        <input type="file" id="mediaFile" accept="image/*,video/*" style="font-size:16px; width:100%;">
        <button class="green-btn" onclick="loadMedia()">読み込む</button>
        <p class="notice">※ iPhoneの写真アプリから選べます。クラウドには保存しません。</p>
    </div>

    <div class="section" id="trimSection" style="display:none;">
        <div class="section-title" id="trimTitle">② 見せたい部分を選ぶ</div>
        <video id="previewVideo" controls playsinline></video>

        <div id="sliderArea">
            <div class="slider-label">▶ 開始位置をスライドで選んでください</div>
            <input type="range" id="startSlider" min="0" value="0" step="0.5">
            <div class="time-display" id="timeDisplay">開始：0秒 → 終了：10秒</div>
            <div class="trim-btns">
                <button class="sub-btn" onclick="previewTrim()">▶ この部分を再生</button>
                <button class="sub-btn" onclick="showFullscreen('trim')">🔍 全画面で確認</button>
            </div>
            <div style="margin-top:15px; border-top:1px solid #ddd; padding-top:15px;">
                <div class="slider-label">💾 この部分に名前をつけて保存</div>
                <input type="text" class="name-input" id="clipName" placeholder="例：口を気にする、下痢の様子">
                <button class="green-btn" onclick="saveClip()">病院用リストに追加する</button>
                <p class="notice">※ 同じ動画から何か所でも保存できます</p>
            </div>
        </div>

        <div id="photoArea" style="display:none;">
            <div class="trim-btns" style="margin-top:10px;">
                <button class="sub-btn" onclick="showFullscreen('photo')">🔍 全画面で確認</button>
            </div>
            <div style="margin-top:15px; border-top:1px solid #ddd; padding-top:15px;">
                <div class="slider-label">💾 この写真に名前をつけて保存</div>
                <input type="text" class="name-input" id="photoName" placeholder="例：皮膚の状態、目やに">
                <button class="green-btn" onclick="savePhoto()">病院用リストに追加する</button>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">③ 病院用リスト（タップしてすぐ再生）</div>
        <p class="notice" style="margin-top:0; margin-bottom:10px;">※ 再生するには先に①で同じファイルを読み込んでください</p>
        <div id="clipList"><p class="empty-msg">まだ保存されていません</p></div>
    </div>

    <div class="modal" id="fullscreenModal">
        <button class="modal-close" onclick="closeFullscreen()">×</button>
        <video id="modalVideo" controls playsinline></video>
        <img id="modalImage">
        <div class="modal-label" id="modalLabel"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOevKlIPTEu1pgZhyf_a-I2US5KbZQi2c",
            authDomain: "uchinoko-58fc7.firebaseapp.com",
            projectId: "uchinoko-58fc7",
            storageBucket: "uchinoko-58fc7.firebasestorage.app",
            messagingSenderId: "47451202211",
            appId: "1:47451202211:web:f205f797c3560f5c7c9516"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TRIM_SEC = 10;
        let currentFile = null;
        let isVideo = false;
        let duration = 0;
        let currentObjectURL = null;

        window.loadMedia = function() {
            const file = document.getElementById('mediaFile').files[0];
            if (!file) return alert("ファイルを選択してください");
            currentFile = file;
            isVideo = file.type.startsWith('video');
            if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
            currentObjectURL = URL.createObjectURL(file);
            document.getElementById('trimSection').style.display = 'block';

            if (isVideo) {
                document.getElementById('trimTitle').textContent = '② 見せたい部分を選ぶ（10秒）';
                document.getElementById('sliderArea').style.display = 'block';
                document.getElementById('photoArea').style.display = 'none';
                const video = document.getElementById('previewVideo');
                video.style.display = 'block';
                video.src = currentObjectURL;
                video.onloadedmetadata = function() {
                    duration = video.duration;
                    const slider = document.getElementById('startSlider');
                    slider.max = Math.max(0, duration - TRIM_SEC).toFixed(1);
                    slider.value = 0;
                    updateTimeDisplay(0);
                };
            } else {
                document.getElementById('trimTitle').textContent = '② 写真のプレビュー';
                document.getElementById('sliderArea').style.display = 'none';
                document.getElementById('photoArea').style.display = 'block';
                document.getElementById('previewVideo').style.display = 'none';
            }
        };

        document.getElementById('startSlider').addEventListener('input', function() {
            const t = parseFloat(this.value);
            updateTimeDisplay(t);
            document.getElementById('previewVideo').currentTime = t;
        });

        function updateTimeDisplay(t) {
            const end = Math.min(t + TRIM_SEC, duration);
            document.getElementById('timeDisplay').textContent =
                `開始：${t.toFixed(1)}秒 → 終了：${end.toFixed(1)}秒`;
        }

        window.previewTrim = function() {
            const video = document.getElementById('previewVideo');
            const start = parseFloat(document.getElementById('startSlider').value);
            video.currentTime = start;
            video.play();
            setTimeout(() => video.pause(), TRIM_SEC * 1000);
        };

        window.showFullscreen = function(mode) {
            const modal = document.getElementById('fullscreenModal');
            const modalVideo = document.getElementById('modalVideo');
            const modalImage = document.getElementById('modalImage');
            modal.classList.add('show');

            if (mode === 'trim') {
                const start = parseFloat(document.getElementById('startSlider').value);
                modalVideo.style.display = 'block';
                modalImage.style.display = 'none';
                modalVideo.src = currentObjectURL;
                modalVideo.onloadedmetadata = function() {
                    modalVideo.currentTime = start;
                    modalVideo.play();
                    setTimeout(() => modalVideo.pause(), TRIM_SEC * 1000);
                };
                document.getElementById('modalLabel').textContent =
                    `「${document.getElementById('clipName').value || '未保存'}」 ${start.toFixed(1)}秒〜${(start + TRIM_SEC).toFixed(1)}秒`;
            } else if (mode === 'play') {
                modalVideo.style.display = 'block';
                modalImage.style.display = 'none';
                modalVideo.src = currentObjectURL;
                modalVideo.onloadedmetadata = function() {
                    modalVideo.currentTime = window._playStart;
                    modalVideo.play();
                    setTimeout(() => modalVideo.pause(), TRIM_SEC * 1000);
                };
                document.getElementById('modalLabel').textContent = window._playLabel;
            } else {
                modalVideo.style.display = 'none';
                modalImage.style.display = 'block';
                modalImage.src = currentObjectURL;
                document.getElementById('modalLabel').textContent = document.getElementById('photoName').value || '写真';
            }
        };

        window.closeFullscreen = function() {
            document.getElementById('fullscreenModal').classList.remove('show');
            document.getElementById('modalVideo').pause();
        };

        window.saveClip = async function() {
            const name = document.getElementById('clipName').value.trim();
            if (!name) return alert("名前を入力してください");
            if (!currentFile) return alert("動画を選択してください");
            const start = parseFloat(document.getElementById('startSlider').value);
            try {
                await addDoc(collection(db, "hospital_clips"), {
                    name, type: 'video',
                    fileName: currentFile.name,
                    startTime: start,
                    duration: TRIM_SEC,
                    timestamp: new Date()
                });
                document.getElementById('clipName').value = '';
                alert(`「${name}」を追加しました！\n同じ動画からもう一か所追加できます。`);
            } catch(e) { alert("保存に失敗しました"); }
        };

        window.savePhoto = async function() {
            const name = document.getElementById('photoName').value.trim();
            if (!name) return alert("名前を入力してください");
            if (!currentFile) return alert("写真を選択してください");
            try {
                await addDoc(collection(db, "hospital_clips"), {
                    name, type: 'photo',
                    fileName: currentFile.name,
                    timestamp: new Date()
                });
                document.getElementById('photoName').value = '';
                alert(`「${name}」を追加しました！`);
            } catch(e) { alert("保存に失敗しました"); }
        };

        window.playClip = function(startTime, label) {
            if (!currentFile) {
                alert("まず①で同じ動画ファイルを読み込んでください");
                return;
            }
            window._playStart = startTime;
            window._playLabel = label;
            showFullscreen('play');
        };

        window.deleteClip = async function(id) {
            if (confirm("このクリップを削除しますか？")) {
                await deleteDoc(doc(db, "hospital_clips", id));
            }
        };

        onSnapshot(query(collection(db, "hospital_clips"), orderBy("timestamp", "desc")), (snapshot) => {
            const listDiv = document.getElementById('clipList');
            listDiv.innerHTML = "";
            if (snapshot.empty) {
                listDiv.innerHTML = '<p class="empty-msg">まだ保存されていません</p>';
                return;
            }
            snapshot.forEach(d => {
                const data = d.data();
                const id = d.id;
                const item = document.createElement('div');
                item.className = 'clip-item';
                const infoText = data.type === 'video'
                    ? `🎬 ${data.fileName}<br>${data.startTime}秒〜${data.startTime + data.duration}秒`
                    : `📷 ${data.fileName}`;
                const label = `${data.name}（${data.startTime}秒〜${data.startTime + data.duration}秒）`;
                item.innerHTML = `
                    <div class="clip-name">${data.name}</div>
                    <div class="clip-info">${infoText}</div>
                    <div class="clip-btns">
                        ${data.type === 'video'
                            ? `<button class="play-btn" onclick="playClip(${data.startTime}, '${data.name}')">▶ 再生する</button>`
                            : `<button class="play-btn" onclick="showFullscreen('photo')">🔍 表示する</button>`}
                        <button class="del-btn" onclick="deleteClip('${id}')">削除</button>
                    </div>`;
                listDiv.appendChild(item);
            });
        });
    </script>
</body>
</html>
