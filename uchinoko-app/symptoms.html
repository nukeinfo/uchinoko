<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>症状 - うちの子記録</title>
    <style>
        /* あなたの元のデザインを完全に維持 */
        body { background-color: #f5f5dc; font-family: sans-serif; padding: 20px; color: #000; }
        h1 { font-size: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .back-btn { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #000; font-weight: bold; }

        /* ワード設定エリア */
        .setting-section { background: #fff; border: 2px solid #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .word-input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #000; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .save-words-btn { background-color: #ccc; border: 1px solid #000; padding: 5px 10px; margin-top: 10px; cursor: pointer; border-radius: 5px; font-size: 14px; }

        /* 抽出ボタン（黄緑） */
        .filter-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .filter-btn { 
            background-color: #adff2f; border: 2px solid #000; border-radius: 10px; 
            padding: 12px 15px; font-weight: bold; cursor: pointer; flex-grow: 1; text-align: center;
        }

        /* 抽出結果リスト */
        .result-item { background: #fff; border: 1px solid #000; padding: 10px; margin-bottom: 5px; border-radius: 5px; text-align: left; }
        .result-time { font-weight: bold; font-size: 14px; color: #555; }
        .result-text { font-size: 16px; margin-top: 5px; white-space: pre-wrap; }
        .empty-msg { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 戻る</a>
    <h1>症状別・事実の抽出</h1>

    <div class="setting-section">
        <small>気になるワードを5つまで設定してください</small>
        <div id="wordInputs">
            <input type="text" class="word-input" placeholder="ワード1">
            <input type="text" class="word-input" placeholder="ワード2">
            <input type="text" class="word-input" placeholder="ワード3">
            <input type="text" class="word-input" placeholder="ワード4">
            <input type="text" class="word-input" placeholder="ワード5">
        </div>
        <button class="save-words-btn" onclick="saveWords()">ワードを更新する</button>
    </div>

    <div id="filterButtons" class="filter-container"></div>
    <hr>
    <h2 id="currentKeywordTitle">抽出結果</h2>
    <div id="filteredList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOevKlIPTEu1pgZhyf_a-I2US5KbZQi2c",
            authDomain: "uchinoko-58fc7.firebaseapp.com",
            projectId: "uchinoko-58fc7",
            storageBucket: "uchinoko-58fc7.firebasestorage.app",
            messagingSenderId: "47451202211",
            appId: "1:47451202211:web:f205f797c3560f5c7c9516"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ページ読み込み時
        window.onload = function() {
            loadWords();
        };

        // ワードの保存（これは各スマホのローカル保存でOK）
        window.saveWords = function() {
            const inputs = document.querySelectorAll('.word-input');
            const words = Array.from(inputs).map(i => i.value).filter(w => w !== "");
            localStorage.setItem('symptom_words', JSON.stringify(words));
            alert("ワードを更新しました");
            loadWords();
        };

        // ワードの読み込みとボタン作成
